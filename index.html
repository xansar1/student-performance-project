<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <title>AI Coaching Dashboard | Student Analytics</title>
  <meta name="description" content="AI-powered student analytics dashboard to track performance, risk, and predictions.">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js (IMPORTANT) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>📊 AI Coaching Dashboard</h1>
    <p class="subtitle">Predict student performance before it drops</p>
  </header>

  <!-- KPI CARDS -->
  <div class="cards">
    <div class="card">
      <h3>Total Students</h3>
      <p id="students">--</p>
    </div>

    <div class="card">
      <h3>Average Score</h3>
      <p id="avg">--</p>
    </div>

    <div class="card">
      <h3>Top Score</h3>
      <p id="top">--</p>
    </div>

    <div class="card danger">
      <h3>At Risk</h3>
      <p id="risk">--</p>
    </div>
  </div>

  <!-- ACTION BUTTON -->
  <div class="actions">
    <button onclick="loadDashboard()" class="btn">
      🚀 Load AI Insights
    </button>
  </div>

  <!-- CHARTS -->
  <section class="charts">
    <div class="chart-box">
      <h3>📊 Subject Performance</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>📈 Student Progress</h3>
      <canvas id="lineChart"></canvas>
    </div>
  </section>

  <!-- TABLE -->
  <section class="table-container">
    <h2>📋 Student Data</h2>

    <table id="studentTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Score</th>
          <th>Risk</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <!-- CTA (IMPORTANT FOR CLIENT FEEL) -->
  <section class="cta">
    <h2>Want this system for your institute?</h2>
    <p>Get AI-powered insights for your students</p>
    <button class="btn">Contact / Demo</button>
  </section>

  <!-- SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
