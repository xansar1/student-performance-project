<!DOCTYPE html>
<html lang="en">
<head>

  <title>AI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📊 AI Coaching Dashboard</h1>

  <div class="cards">

      <h3>Total Students</h3>
      <p id="students">--</p>
    </div>

    <div class="card">
      <h3>Average Score</h3>
      <p id="avg">--</p>

      <p id="top">--</p>

      <p id="risk">--</p>
    </div>
  </div>

  <button onclick="loadData()">Load Data</button>

  <script src="script.js"></script>

</html>
