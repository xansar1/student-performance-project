<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📊 AI Coaching Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h3>Total Students</h3>
      <p id="students">--</p>
    </div>

    <div class="card">
      <h3>Average Score</h3>
      <p id="avg">--</p>
    </div>

    <div class="card">
      <h3>Top Score</h3>
      <p id="top">--</p>
    </div>

    <div class="card">
      <h3>At Risk</h3>
      <p id="risk">--</p>
    </div>
  </div>

  <div class="actions">
    <button onclick="loadDashboard()" class="btn">🚀 Load AI Insights</button>
  </div>
  
  <!-- Charts Section -->
  <div class="charts">
    <canvas id="barChart"></canvas>
    <canvas id="lineChart"></canvas>
  </div>
  
  <!-- Table -->
  <div class="table-container">
    <h3>Student Data</h3>
    <table id="studentTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Score</th>
          <th>Risk</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="script.js"></script>
</body>
</html>
